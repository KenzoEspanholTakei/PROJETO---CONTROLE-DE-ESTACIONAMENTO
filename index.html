<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estacionamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Área do Formulário -->
        <div class="col-span-1 bg-white/20 backdrop-blur-md border border-white/30 rounded-2xl p-6 shadow-xl text-white h-fit">
            <h2 class="text-2xl font-bold mb-4">Entrada de Veículo</h2>
            <form id="vehicle-form" class="space-y-4">
                <div>
                    <label for="placa" class="block text-sm font-medium">Placa</label>
                    <input type="text" id="placa" required placeholder="ABC-1234" 
                           class="w-full mt-1 px-4 py-2 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-white/50 placeholder-white/50 text-white">
                </div>
                <div>
                    <label for="modelo" class="block text-sm font-medium">Modelo do Veículo</label>
                    <input type="text" id="modelo" required placeholder="Honda Civic" 
                           class="w-full mt-1 px-4 py-2 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-white/50 placeholder-white/50 text-white">
                </div>
                <button type="submit" 
                        class="w-full py-2 bg-white/30 hover:bg-white/40 border border-white/30 rounded-lg transition font-semibold mt-4">
                    Registrar Entrada
                </button>
            </form>
        </div>

        <!-- Área do Pátio (Lista) -->
        <div class="col-span-1 md:col-span-2 bg-white/20 backdrop-blur-md border border-white/30 rounded-2xl p-6 shadow-xl text-white flex flex-col h-full min-h-[400px]">
            <h2 class="text-2xl font-bold mb-4">Veículos no Pátio</h2>
            <div id="vehicle-list" class="flex-1 overflow-y-auto space-y-4 pr-2">
                <!-- Os cartões dos veículos serão inseridos aqui -->
            </div>
            <div id="empty-message" class="hidden text-center text-white/70 italic mt-8">
                Nenhum veículo no pátio.
            </div>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
