<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estacionamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-6xl grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <!-- Área Lateral (Config e Formulário) -->
        <div class="col-span-1 space-y-6">
            
            <!-- Tabela de Preços -->
            <div class="bg-white/20 backdrop-blur-md border border-white/30 rounded-2xl p-6 shadow-xl text-white">
                <h2 class="text-xl font-bold mb-4">Tabela de Preços</h2>
                <form id="config-form" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="preco-carro" class="block text-sm font-medium">Hora Carro (R$)</label>
                            <input type="number" id="preco-carro" step="0.01" required class="w-full mt-1 px-3 py-2 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-white/50 text-white">
                        </div>
                        <div>
                            <label for="preco-moto" class="block text-sm font-medium">Hora Moto (R$)</label>
                            <input type="number" id="preco-moto" step="0.01" required class="w-full mt-1 px-3 py-2 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-white/50 text-white">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="preco-diaria-carro" class="block text-sm font-medium">Diária Carro (R$)</label>
                            <input type="number" id="preco-diaria-carro" step="0.01" required class="w-full mt-1 px-3 py-2 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-white/50 text-white">
                        </div>
                        <div>
                            <label for="preco-diaria-moto" class="block text-sm font-medium">Diária Moto (R$)</label>
                            <input type="number" id="preco-diaria-moto" step="0.01" required class="w-full mt-1 px-3 py-2 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-white/50 text-white">
                        </div>
                    </div>
                    <button type="submit" class="w-full py-2 bg-blue-500/80 hover:bg-blue-600 border border-blue-400/50 rounded-lg transition font-semibold">
                        Salvar Preços
                    </button>
                </form>
            </div>

            <!-- Área do Formulário -->
            <div class="bg-white/20 backdrop-blur-md border border-white/30 rounded-2xl p-6 shadow-xl text-white h-fit">
                <h2 class="text-2xl font-bold mb-4">Entrada</h2>
                <form id="vehicle-form" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label for="placa" class="block text-sm font-medium">Placa</label>
                            <input type="text" id="placa" required placeholder="ABC-1234" 
                                class="w-full mt-1 px-4 py-2 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-white/50 placeholder-white/50 text-white">
                        </div>
                        <div>
                            <label for="tipo" class="block text-sm font-medium">Tipo</label>
                            <select id="tipo" class="w-full mt-1 px-4 py-2 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-white/50 text-white [&>option]:text-black">
                                <option value="carro">Carro</option>
                                <option value="moto">Moto</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label for="modelo" class="block text-sm font-medium">Modelo do Veículo</label>
                        <input type="text" id="modelo" required placeholder="Ex: Honda Civic" 
                               class="w-full mt-1 px-4 py-2 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-white/50 placeholder-white/50 text-white">
                    </div>
                    <div>
                        <label for="data-entrada" class="block text-sm font-medium">Data/Hora Entrada</label>
                        <input type="datetime-local" id="data-entrada" required 
                               class="w-full mt-1 px-4 py-2 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-white/50 text-white">
                    </div>
                    <button type="submit" 
                            class="w-full py-2 bg-white/30 hover:bg-white/40 border border-white/30 rounded-lg transition font-semibold mt-4">
                        Registrar Entrada
                    </button>
                </form>
            </div>

        </div>

        <!-- Área do Pátio (Lista) -->
        <div class="col-span-1 md:col-span-2 bg-white/20 backdrop-blur-md border border-white/30 rounded-2xl p-6 shadow-xl text-white flex flex-col h-full min-h-[400px]">
            <h2 class="text-2xl font-bold mb-4">Veículos no Pátio</h2>
            <div id="vehicle-list" class="flex-1 overflow-y-auto space-y-4 pr-2">
                <!-- Os cartões dos veículos serão inseridos aqui -->
            </div>
            <div id="empty-message" class="hidden text-center text-white/70 italic mt-8">
                Nenhum veículo no pátio.
            </div>
        </div>
    </div>

    <!-- Modal de Recibo -->
    <div id="receipt-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white/20 backdrop-blur-lg border border-white/30 rounded-2xl p-8 shadow-2xl text-white max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300 relative">
            <h3 class="text-2xl font-bold mb-6 text-center border-b border-white/20 pb-4">Recibo de Saída</h3>
            <div class="space-y-4 mb-8">
                <div class="flex justify-between">
                    <span class="text-white/70">Placa:</span>
                    <span id="receipt-placa" class="font-bold tracking-wider">---</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-white/70">Modelo:</span>
                    <span id="receipt-modelo" class="font-semibold">---</span>
                </div>
                <div class="flex flex-col space-y-1">
                    <span class="text-white/70 text-sm">Entrada Registrada:</span>
                    <span id="receipt-entrada">---</span>
                </div>
                <div class="flex flex-col space-y-1">
                    <label for="receipt-data-saida" class="text-white/70 text-sm">Editar Hora Saída:</label>
                    <input type="datetime-local" id="receipt-data-saida" class="w-full px-3 py-2 bg-white/10 border border-white/20 rounded-lg focus:outline-none focus:ring-2 focus:ring-white/50 text-white text-sm">
                </div>
                <div class="flex justify-between border-t border-white/10 pt-2">
                    <span class="text-white/70">Tempo Faturado:</span>
                    <span id="receipt-tempo" class="font-semibold">---</span>
                </div>
                <div class="flex justify-between text-lg border-t border-white/20 pt-4 mt-4">
                    <span class="font-bold text-white/90">Valor a Pagar:</span>
                    <span id="receipt-valor" class="font-bold text-green-400">R$ 0,00</span>
                </div>
            </div>
            <button id="btn-close-modal" class="w-full py-3 bg-white/20 hover:bg-white/30 border border-white/30 rounded-xl transition font-bold text-lg">
                Finalizar Pagamento
            </button>
            <button id="btn-cancel-modal" class="w-full py-2 mt-2 bg-transparent hover:bg-white/10 border border-transparent hover:border-white/20 rounded-xl transition font-medium text-sm text-white/70">
                Cancelar Saída
            </button>
        </div>
    </div>

    <script type="module" src="./js/app.js"></script>
</body>
</html>
